<!DOCTYPE html>

<html>
<head>
<style>
  .map-wrapper {
    width: 90%;
    height: 500px;
    margin: auto;
    overflow: hidden;
    border-radius: 15px;
    position: relative;
  }

.map-wrapper iframe {
width: 100%;
height: 600px; /* bigger than container */
border: 0;
position: absolute;
top: -100px; /* pushes header out of view */
left: 0;
} </style>

</head>

<body>

<div class="map-wrapper">
  <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1smpxzAgKMuCcmPx_EN561ZtVM2kvLgw&ehbc=2E312F"></iframe>
</div>

</body>
</html>
