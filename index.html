<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Map Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #0f172a;
            color: white;
        }

        h1 {
            margin: 20px;
        }

        .map-container {
            width: 90%;
            height: 500px;
            margin: auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>

<body>

    <h1>My Custom Location</h1>

    <div class="map-container">
        <iframe 
            src="https://www.google.com/maps/d/u/0/embed?mid=1smpxzAgKMuCcmPx_EN561ZtVM2kvLgw&ehbc=2E312F"
            loading="lazy">
        </iframe>
    </div>

</body>
</html>
