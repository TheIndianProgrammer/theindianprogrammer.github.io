<!DOCTYPE html>

<html>
<head>
<style>
  body {
    margin: 0;
    background: #0f172a;
  }

.map-wrapper {
width: 90%;
height: 500px;
margin: 40px auto;
border-radius: 15px;
overflow: hidden;
position: relative;
}

iframe {
width: 100%;
height: 100%;
border: 0;
}

/* Overlay to hide top bar text */
.top-mask {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 60px;
background: rgba(15, 23, 42, 0.95); /* matches your theme */
pointer-events: none; /* allows clicks through */
} </style>

</head>

<body>

<div class="map-wrapper">
  <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1smpxzAgKMuCcmPx_EN561ZtVM2kvLgw&ehbc=2E312F"></iframe>
  <div class="top-mask"></div>
</div>

</body>
</html>
